# phoss-ap application configuration
spring.application.name=phoss-ap
server.port=8080

# === Database (PostgreSQL) ===
#jdbc.url=jdbc:postgresql://localhost:5432/phoss_ap
#jdbc.user=phoss_ap
#jdbc.password=
#jdbc.schema=public

# Connection pool
#jdbc.pool.initial-size=2
#jdbc.pool.max-total=20
#jdbc.pool.max-idle=10
#jdbc.pool.min-idle=2

# Flyway
#flyway.enabled=true
#flyway.jdbc.url=${jdbc.url}
#flyway.jdbc.user=${jdbc.user}
#flyway.jdbc.password=${jdbc.password}

# === Peppol Identity ===
#peppol.seatid=
#peppol.owner.countrycode=

# === API Security ===
#phase4.api.requiredtoken=

# === AS4 / phase4 ===
#phase4.keystore.type=PKCS12
#phase4.keystore.path=
#phase4.keystore.password=
#phase4.keystore.key.alias=
#phase4.keystore.key.password=
#phase4.truststore.type=JKS
#phase4.truststore.path=
#phase4.truststore.password=

# === Outbound Sending ===
#phase4.send.timeout.connection.ms=5000
#phase4.send.timeout.request.ms=10000
#phase4.send.timeout.response.ms=30000

# === Retry (Sending) ===
#retry.sending.enabled=true
#retry.sending.interval.ms=30000
#retry.sending.batch-size=50
#retry.sending.max-attempts=5
#retry.sending.initial-backoff.ms=60000
#retry.sending.backoff-multiplier=2.0
#retry.sending.max-backoff.ms=3600000

# === Retry (Forwarding) ===
#retry.forwarding.enabled=true
#retry.forwarding.interval.ms=30000
#retry.forwarding.batch-size=50
#retry.forwarding.max-attempts=5
#retry.forwarding.initial-backoff.ms=60000
#retry.forwarding.backoff-multiplier=2.0
#retry.forwarding.max-backoff.ms=3600000

# === Forwarding ===
#forwarding.mode=http_post_async
#forwarding.http.url=
#forwarding.http.timeout.connection.ms=5000
#forwarding.http.timeout.response.ms=30000

# === Circuit Breaker ===
#circuit-breaker.failure-threshold=5
#circuit-breaker.open-duration.ms=60000
#circuit-breaker.half-open-max-attempts=3

# === Duplicate Detection ===
#duplicate-detection.as4.mode=store_and_flag
#duplicate-detection.sbdh.mode=store_and_flag

# === Verification ===
#verification.inbound.enabled=false
#verification.outbound.enabled=false

# === MLS ===
#mls.type=failure_only

# === Archival ===
#archival.scheduler.enabled=false
#archival.scheduler.interval.ms=86400000

# === Startup Recovery ===
#startup.recovery.enabled=true

# === Actuator ===
management.endpoints.web.exposure.include=health,info
